name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-2025
    timeout-minutes: 25
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check out tagged source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release version
        id: version
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:RELEASE_TAG -notmatch '^v(\d+\.\d+\.\d+)$') {
              throw "The tag must use the form v1.2.3."
          }
          $version = $Matches[1]
          $manifest = Test-ModuleManifest `
              .\src\Catalanitzador.Windows\Catalanitzador.Windows.psd1
          if ($manifest.Version.ToString() -ne $version) {
              throw "The tag and module versions do not match."
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Install pinned validation modules
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $requirements = Import-PowerShellDataFile .\build\requirements.psd1
          New-Item -ItemType Directory -Path .\.psmodules -Force | Out-Null
          foreach ($name in @('Pester', 'PSScriptAnalyzer')) {
              Save-PSResource `
                  -Name $name `
                  -Version $requirements[$name] `
                  -Path .\.psmodules `
                  -TrustRepository `
                  -Quiet
          }

      - name: Run complete validation
        shell: pwsh
        run: |
          $process = Start-Process `
              -FilePath "$env:WINDIR\System32\WindowsPowerShell\v1.0\powershell.exe" `
              -ArgumentList @(
                  '-NoLogo'
                  '-NoProfile'
                  '-ExecutionPolicy'
                  'RemoteSigned'
                  '-File'
                  '.\build\Invoke-Tests.ps1'
              ) `
              -NoNewWindow `
              -Wait `
              -PassThru
          if ($process.ExitCode -ne 0) {
              throw "Windows PowerShell validation exited with $($process.ExitCode)."
          }

      - name: Build release assets
        shell: powershell
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          .\build\Build-Release.ps1 -Version $env:RELEASE_VERSION

      - name: Attest release assets
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            dist/*.zip
            dist/*.ps1
            dist/SHA256SUMS

      - name: Upload release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          path: |
            dist/*.zip
            dist/*.ps1
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: build
    runs-on: windows-2025
    timeout-minutes: 10
    environment: release
    permissions:
      actions: read
      contents: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
          path: dist

      - name: Publish immutable tag assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:RELEASE_TAG -notmatch '^v\d+\.\d+\.\d+$') {
              throw "The tag must use the form v1.2.3."
          }
          $assets = @(
              Get-ChildItem -LiteralPath .\dist -File |
                  Where-Object {
                      $_.Extension -eq '.zip' -or
                      $_.Extension -eq '.ps1' -or
                      $_.Name -eq 'SHA256SUMS'
                  } |
                  Sort-Object Name
          )
          if ($assets.Count -ne 3) {
              throw "Expected one ZIP, one installer, and SHA256SUMS."
          }
          $assetPaths = @($assets.FullName)
          $expectedAssetNames = @($assets.Name | Sort-Object)

          $existingReleaseJson = & gh release view $env:RELEASE_TAG `
              --json isDraft,assets 2>$null
          if ($LASTEXITCODE -eq 0) {
              $existingRelease = $existingReleaseJson | ConvertFrom-Json
              if (-not $existingRelease.isDraft) {
                  throw "The release already exists and is not a draft."
              }
              $unexpectedAssetNames = @(
                  $existingRelease.assets |
                      Select-Object -ExpandProperty name |
                      Where-Object { $expectedAssetNames -notcontains $_ }
              )
              if ($unexpectedAssetNames.Count -gt 0) {
                  throw (
                      "The existing draft has unexpected assets: " +
                      "$($unexpectedAssetNames -join ', ')."
                  )
              }
          }
          else {
              & gh release create $env:RELEASE_TAG `
                  --draft `
                  --verify-tag `
                  --generate-notes
              if ($LASTEXITCODE -ne 0) {
                  throw (
                      "GitHub draft release creation failed with " +
                      "$LASTEXITCODE."
                  )
              }
          }

          & gh release upload $env:RELEASE_TAG @assetPaths --clobber
          if ($LASTEXITCODE -ne 0) {
              throw "GitHub release asset upload failed with $LASTEXITCODE."
          }

          $release = & gh release view $env:RELEASE_TAG `
              --json isDraft,assets |
                  ConvertFrom-Json
          if ($LASTEXITCODE -ne 0) {
              throw "GitHub release verification failed with $LASTEXITCODE."
          }
          $publishedAssetNames = @(
              $release.assets |
                  Select-Object -ExpandProperty name |
                  Sort-Object
          )
          if (-not $release.isDraft -or
              $publishedAssetNames.Count -ne 3 -or
              (Compare-Object `
                  -ReferenceObject $expectedAssetNames `
                  -DifferenceObject $publishedAssetNames)) {
              throw "The draft release does not contain the expected assets."
          }

          $verificationDirectory = Join-Path $env:RUNNER_TEMP (
              "release-verification-$([guid]::NewGuid().ToString('N'))"
          )
          New-Item -ItemType Directory -Path $verificationDirectory |
              Out-Null
          try {
              & gh release download $env:RELEASE_TAG `
                  --dir $verificationDirectory `
                  --pattern '*.zip' `
                  --pattern '*.ps1' `
                  --pattern 'SHA256SUMS'
              if ($LASTEXITCODE -ne 0) {
                  throw (
                      "GitHub release asset download failed with " +
                      "$LASTEXITCODE."
                  )
              }

              foreach ($asset in $assets) {
                  $downloadedPath = Join-Path `
                      $verificationDirectory `
                      $asset.Name
                  if (-not (Test-Path -LiteralPath $downloadedPath)) {
                      throw "The uploaded asset is missing: $($asset.Name)."
                  }

                  $localHash = (
                      Get-FileHash -LiteralPath $asset.FullName -Algorithm SHA256
                  ).Hash
                  $uploadedHash = (
                      Get-FileHash -LiteralPath $downloadedPath -Algorithm SHA256
                  ).Hash
                  if ($uploadedHash -ine $localHash) {
                      throw (
                          "The uploaded asset digest does not match: " +
                          "$($asset.Name)."
                      )
                  }
              }
          }
          finally {
              Remove-Item `
                  -LiteralPath $verificationDirectory `
                  -Recurse `
                  -Force `
                  -ErrorAction SilentlyContinue
          }

          & gh release edit $env:RELEASE_TAG --draft=false
          if ($LASTEXITCODE -ne 0) {
              throw "GitHub release publication failed with $LASTEXITCODE."
          }

          $publishedReleaseJson = & gh api `
              -H 'X-GitHub-Api-Version: 2026-03-10' `
              "repos/$env:GH_REPO/releases/tags/$env:RELEASE_TAG"
          if ($LASTEXITCODE -ne 0) {
              throw "GitHub release immutability verification failed."
          }
          $publishedRelease = $publishedReleaseJson | ConvertFrom-Json
          if ($publishedRelease.draft -or -not $publishedRelease.immutable) {
              throw "The published release is not immutable."
          }
